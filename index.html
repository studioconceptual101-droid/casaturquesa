<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Casa Turquesa</title>
	<link rel="icon" type="image/png" href="images/favicon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Nunito:ital,wght@0,200;0,300;0,400;0,600;0,700;1,200;1,400&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap-theme.min.css">
	<script src="https://kit.fontawesome.com/1958077107.js" crossorigin="anonymous"></script>
	<style>
		*{margin:0;box-sizing:border-box}
		body{font-family:'Nunito',sans-serif;margin:0;background-image:url('images/background_3.jpg');background-size:cover;background-attachment:fixed;display:flex;flex-direction:column;min-height:100vh;padding:40px 0 0;overflow-x:hidden}
		h1,h2,h3{font-family:'Cinzel',serif}
		.head-principal{padding:20px 0;position:relative;z-index:10}
		.container.principal{width:100%;max-width:500px;margin:0 auto;text-align:center}
		.logo-home{width:280px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 10px 30px rgba(0,0,0,0.3))}
		.menu-ppal{margin-top:auto;position:relative;z-index:10;padding-bottom:20px}
		.social-icons{font-size:0;text-align:center;padding:30px 0 15px 0;position:relative;z-index:10}
		.social-icons img{width:32px;height:32px;margin:0 12px;opacity:0.8;transition:opacity 0.3s ease}
		.social-icons img:hover{opacity:1}
		.pie-de-pag{position:relative;z-index:10}
		
		.header{height:70px;position:fixed;top:0;left:0;width:100%;z-index:1001}
		.nav{display:flex;justify-content:center;align-items:center;width:100%;max-width:1200px;margin:0 auto;padding:0 20px;height:100%}
		.nav-toggle{color:#fff;background:rgba(255,255,255,0.15);border:none;font-size:20px;width:45px;height:45px;border-radius:50%;cursor:pointer;display:none;transition:all 0.3s ease}
		.nav-toggle:hover{background:rgba(255,255,255,0.25)}
		.nav-menu{display:flex;margin:0;padding:0;list-style:none;gap:5px}
		.nav-menu-item{font-size:15px;text-transform:uppercase;letter-spacing:1px}
		.nav-menu-link{display:block;padding:8px 14px;border-radius:25px;text-align:center;color:#fff;text-decoration:none;font-family:'Cinzel',serif;transition:all 0.3s ease}
		.nav-menu-link:hover{background:rgba(255,255,255,0.15)}
		.menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);opacity:0;visibility:hidden;transition:all 0.3s ease;z-index:999}
		.menu-overlay.active{opacity:1;visibility:visible}
		
		/* Partículas flotantes */
		.particles-container{position:fixed;top:-50px;left:0;width:100%;height:calc(100% + 100px);pointer-events:none;z-index:1;overflow:hidden}
		.particle{position:absolute;opacity:0.2;animation:floatParticle linear infinite}
		.particle svg{width:100%;height:100%}
		@keyframes floatParticle{
			0%{transform:translateY(0) rotate(0deg);opacity:0}
			5%{opacity:0.2}
			95%{opacity:0.2}
			100%{transform:translateY(calc(100vh + 100px)) rotate(720deg);opacity:0}
		}
		
		/* Luz suave animada */
		.ambient-glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 40%,rgba(57,159,182,0.06) 0%,transparent 50%);animation:ambientPulse 10s ease-in-out infinite}
		@keyframes ambientPulse{
			0%,100%{opacity:0.6;transform:scale(1)}
			50%{opacity:1;transform:scale(1.05)}
		}
		
		@media(max-width:768px){
			body{padding-top:0}
			.header{position:relative;height:auto;padding:15px 0;background:transparent}
			.head-principal{padding:20px 0 10px}
			.logo-home{width:220px}
			.menu-ppal{padding:10px 0}
			.nav-toggle{display:flex;align-items:center;justify-content:center;position:absolute;top:50%;right:15px;transform:translateY(-50%)}
			.nav{justify-content:center;padding:0 60px}
			.nav-menu{position:fixed;top:0;right:-85%;width:85%;height:100vh;background:linear-gradient(180deg,rgba(26,26,46,0.98),rgba(22,33,62,0.98));flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1);z-index:1000;margin:0;padding:80px 20px;box-shadow:-5px 0 30px rgba(0,0,0,0.5)}
			.nav-menu.active{right:0}
			.nav-menu-item{opacity:0;transform:translateX(30px)}
			.nav-menu.active .nav-menu-item{opacity:1;transform:translateX(0);transition:all 0.4s ease}
			.nav-menu.active li:nth-child(1){transition-delay:0.08s}
			.nav-menu.active li:nth-child(2){transition-delay:0.12s}
			.nav-menu.active li:nth-child(3){transition-delay:0.16s}
			.nav-menu.active li:nth-child(4){transition-delay:0.2s}
			.nav-menu.active li:nth-child(5){transition-delay:0.24s}
			.nav-menu-link{padding:12px 30px;font-size:16px;color:#fff;width:100%}
			.nav-toggle{position:fixed;top:20px;right:15px;z-index:1001}
			.nav-toggle .fa-bars{transition:all 0.3s ease}
			.nav-toggle.active .fa-bars{opacity:0;transform:rotate(180deg)}
			.nav-toggle .fa-times{position:absolute;opacity:0;transition:all 0.3s ease}
			.nav-toggle.active .fa-times{opacity:1;transform:rotate(180deg)}
			.social-icons{padding:20px 0 10px}
			.social-icons img{width:30px;height:30px;margin:0 10px}
		}
		
		@media(max-width:480px){
			.logo-home{width:180px}
			.nav-menu-link{padding:10px 25px;font-size:15px}
		}
	</style>
</head>
<body>
	<div class="ambient-glow"></div>
	<div class="particles-container" id="particles"></div>
	
	<header class="header">
		<nav class="nav">
			<button class="nav-toggle">
				<i class="fa-solid fa-bars"></i>
				<i class="fa-solid fa-times"></i>
			</button>
			<ul class="nav-menu">
				<li class="nav-menu-item"><a href="acercade.html" class="nav-menu-link nav-link">Acerca de</a></li>
				<li class="nav-menu-item"><a href="productos.html" class="nav-menu-link nav-link">Productos</a></li>
				<li class="nav-menu-item"><a href="aceitedeoliva.html" class="nav-menu-link nav-link">Aceite de oliva</a></li>
				<li class="nav-menu-item"><a href="saldemaras.html" class="nav-menu-link nav-link">Sal rosada de maras</a></li>
				<li class="nav-menu-item"><a href="contacto.html" class="nav-menu-link nav-link">Contacto</a></li>
			</ul>
		</nav>
	</header>
	<div class="menu-overlay"></div>
	
	<section class="head-principal">
		<div class="container principal">
			<a href="index.html">
				<img src="images/logo-casaturquesa-white-400X300.png" class="logo-home" alt="Casa Turquesa">
			</a>
		</div>
	</section>
	
	<section class="menu-ppal">
		<nav class="nav-desktop" style="display:none"></nav>
	</section>
	
	<section class="redes">
		<div class="social-icons">
			<a href="#"><img src="icons/icon_facebook-w.svg" alt="Facebook"></a>
			<a href="#"><img src="icons/icon_twitter-w.svg" alt="Twitter"></a>
			<a href="#"><img src="icons/icon_instagram-w.svg" alt="Instagram"></a>
			<a href="#"><img src="icons/icon_whatsapp-w.svg" alt="Whatsapp"></a>
			<a href="#"><img src="icons/icon_email-w.svg" alt="Email"></a>
		</div>
	</section>
	
	<section class="pie-de-pag">
		<footer style="background-color:#0000009c;background-blend-mode:multiply;color:#fff;text-align:center;padding:12px;font-family:'Nunito',sans-serif;font-size:11px">
			<p>Copyright &copy; 2023 Casa Turquesa | Todos los derechos reservados</p>
		</footer>
	</section>
	<script>
		const navToggle=document.querySelector(".nav-toggle");
		const navMenu=document.querySelector(".nav-menu");
		const menuOverlay=document.querySelector(".menu-overlay");
		
		function toggleMenu(){
			navToggle.classList.toggle("active");
			navMenu.classList.toggle("active");
			menuOverlay.classList.toggle("active");
			document.body.style.overflow=navMenu.classList.contains("active")?"hidden":"";
		}
		
		navToggle.addEventListener("click",toggleMenu);
		menuOverlay.addEventListener("click",toggleMenu);
		
		document.querySelectorAll(".nav-menu-link").forEach(link=>{
			link.addEventListener("click",()=>{
				if(window.innerWidth<=768&&navMenu.classList.contains("active")){toggleMenu()}
			});
		});
		
		/* Partículas flotantes tipo hojas de olivo */
		const particlesContainer=document.getElementById('particles');
		const particleCount=12;
		
		function createParticle(){
			const particle=document.createElement('div');
			particle.classList.add('particle');
			
			const size=Math.random()*18+12;
			const startX=Math.random()*100;
			const duration=Math.random()*20+25;
			const delay=Math.random()*8;
			const horizontalDrift=(Math.random()-0.5)*100;
			
			particle.style.cssText=`
				width:${size}px;
				height:${size}px;
				left:${startX}%;
				animation-duration:${duration}s;
				animation-delay:${delay}s;
				--drift:${horizontalDrift}px;
			`;
			
			particle.innerHTML=`
				<svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)">
					<path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
				</svg>
			`;
			
			particlesContainer.appendChild(particle);
		}
		
		for(let i=0;i<particleCount;i++){
			createParticle();
		}
	</script>
</body>
</html>
